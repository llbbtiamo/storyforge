server:
  port: 8080

spring:
  application:
    name: storyforge
  profiles:
    active: dev

  # Jackson 全局配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # Servlet
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 认证配置
auth:
  captcha-expire-seconds: 120
  captcha-length: 4
  captcha-width: 160
  captcha-height: 50
  captcha-circle-count: 20
  register-email-code-expire-seconds: 300
  register-email-resend-seconds: 60

# SpringDoc (Swagger)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  info:
    title: StoryForge API
    description: AI 小说写作平台 API 文档
    version: 1.0.0
